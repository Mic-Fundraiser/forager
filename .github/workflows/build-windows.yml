name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # niente weasyprint su Windows: l'export PDF degrada al fallback browser
          pip install flask==3.0.3 markupsafe==2.1.5 requests==2.32.3 pyinstaller==6.11.1

      - name: Build executable
        run: pyinstaller packaging/forager-win.spec --noconfirm

      - name: Smoke test (l'exe parte e risponde)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/Forager/Forager.exe" -PassThru
          $ok = $false
          foreach ($i in 1..45) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:5000/welcome" -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) { throw "Forager.exe non risponde su :5000" }
          Write-Host "SMOKE OK — Forager.exe serve la UI"

      - name: Package zip
        shell: pwsh
        run: |
          $v = (Select-String -Path config.py -Pattern '__version__ = "(.+)"').Matches.Groups[1].Value
          Compress-Archive -Path dist/Forager -DestinationPath "Forager-$v-windows-x64.zip"
          Get-Item Forager-*-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: forager-windows-x64
          path: Forager-*-windows-x64.zip
          retention-days: 30
