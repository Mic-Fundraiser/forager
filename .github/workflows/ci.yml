name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # weasyprint richiede librerie native: per i test bastano flask e requests
          pip install flask==3.0.3 markupsafe==2.1.5 requests==2.32.3 pytest
      - name: Compile check
        run: python -m py_compile app.py db.py ai_engine.py hunter.py i18n.py config.py prompts.py avatars.py
      - name: Run smoke tests
        run: python -m pytest tests/ -q
